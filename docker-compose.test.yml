services:
  postgres-test:
    image: postgres:16-alpine
    container_name: web3-fashion-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: web3_fashion_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d web3_fashion_test"]
      interval: 2s
      timeout: 5s
      retries: 10
