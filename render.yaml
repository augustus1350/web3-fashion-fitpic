# Deploy: https://render.com -> New -> Blueprint -> connect GitHub repo
services:
  - type: web
    name: fitpic-farcaster-poc
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    healthCheckGracePeriodSeconds: 180
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_PGLITE
        value: "1"
      - key: FOUNDER_FIDS
        value: "1"
      - key: ENABLE_DEV_ROUTES
        value: "1"
