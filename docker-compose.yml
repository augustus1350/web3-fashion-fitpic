services:
  postgres:
    image: postgres:16-alpine
    container_name: web3-fashion-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: web3_fashion
    ports:
      - "5432:5432"
    volumes:
      - web3_fashion_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d web3_fashion"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  web3_fashion_pgdata:
